{% extends 'base.html' %}
{% block title %}Entrar — Controle Produtividade Pré-Banho e Banho{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo"><img src="{{ url_for('static', filename='logo_decio.png') }}" alt="Décio" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;"></div>
    <h1 class="login-title">Produtividade Pré-Banho e Banho</h1>
    <p class="login-sub">Controle de produtividade</p>

    {% if erro %}<div class="alert alert-err"><i class="bi bi-exclamation-triangle-fill"></i>{{ erro }}</div>{% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="field">
        <label class="label">Usuário</label>
        <input type="text" name="usuario" class="input" placeholder="Seu login" required autofocus autocapitalize="none" autocomplete="username">
      </div>
      <div class="field">
        <label class="label">Senha</label>
        <div class="senha-wrap">
          <input type="password" id="campoSenha" name="senha" class="input" placeholder="Sua senha" required autocomplete="current-password">
          <button type="button" class="senha-toggle" id="btnVerSenha" onclick="verSenha()" aria-label="Mostrar senha" title="Mostrar senha"><i class="bi bi-eye"></i></button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block"><i class="bi bi-box-arrow-in-right"></i>Entrar</button>
    </form>
  </div>
</div>
<script>
function verSenha(){
  var c=document.getElementById('campoSenha');
  var b=document.getElementById('btnVerSenha');
  var mostrar=c.type==='password';
  c.type=mostrar?'text':'password';
  b.innerHTML=mostrar?'<i class="bi bi-eye-slash"></i>':'<i class="bi bi-eye"></i>';
  b.setAttribute('title',mostrar?'Ocultar senha':'Mostrar senha');
  b.setAttribute('aria-label',mostrar?'Ocultar senha':'Mostrar senha');
  c.focus();
}
</script>
{% endblock %}
